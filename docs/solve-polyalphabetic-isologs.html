<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polyalphabetic Isologs: Reduce to Monoalphabetic</title>
<style>
  body { font-family: monospace; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-family: sans-serif; }
  p, label { font-family: sans-serif; }
  .field { margin-top: 1rem; }
  .field label { display: block; margin-bottom: 0.3rem; }
  input[type="text"] { font-family: monospace; font-size: 0.95rem; width: 100%; box-sizing: border-box; padding: 0.3rem; }
  input[type="number"] { font-family: monospace; font-size: 0.95rem; width: 6rem; padding: 0.3rem; }
  button { margin-top: 1rem; padding: 0.5rem 1rem; font-family: sans-serif; cursor: pointer; }
  #output {
    background: #f4f4f4;
    padding: 1rem;
    margin-top: 1.5rem;
    height: 28rem;
    overflow-y: auto;
    overflow-x: auto;
    white-space: pre;
    border: 1px solid #ccc;
    resize: both;
  }
  a { font-family: sans-serif; }
</style>
</head>
<body>
  <p><a href="index.html">&larr; back to tools</a></p>
  <h1>Polyalphabetic Isologs: Reduce to Monoalphabetic</h1>
  <p>Cryptanalysis of two periodic polyalphabetic isolog messages (two ciphertexts whose underlying plaintexts are identical), using the method described in Abraham Sinkov's <em>Elementary Cryptanalysis</em>, section 3.8, pp. 96-110.</p>

  <div class="field">
    <label for="message1">Message 1 (ciphertext)</label>
    <input type="text" id="message1">
  </div>
  <div class="field">
    <label for="period1">Period 1</label>
    <input type="number" id="period1" min="1" autocomplete="off">
  </div>
  <div class="field">
    <label for="message2">Message 2 (ciphertext)</label>
    <input type="text" id="message2">
  </div>
  <div class="field">
    <label for="period2">Period 2</label>
    <input type="number" id="period2" min="1" autocomplete="off">
  </div>

  <div style="display:flex; align-items:center; gap:1.5rem; margin-top:1rem;">
    <button id="run">Run</button>
    <label style="font-family:sans-serif; margin-top:0;"><input type="checkbox" id="debuggingMode"> Verbose</label>
  </div>

  <pre id="output" readonly></pre>

<script src="js/reconstruction-matrix.js"></script>
<script>
const EMPTY = '.';

function stripWhitespace(text) {
  return text.replace(/\s+/g, '');
}

function alignArrows(lines) {
  const split = lines.map(line => line.split(' -> '));
  const threeparts = split.map(p => p.length === 3);
  const active = split.filter((_, i) => threeparts[i]);
  if (active.length === 0) return lines;
  const maxP1 = Math.max(...active.map(p => p[0].length));
  const maxP2 = Math.max(...active.map(p => p[1].length));
  return lines.map((line, i) => {
    if (!threeparts[i]) return line;
    const [p1, p2, p3] = split[i];
    return p1.padEnd(maxP1) + ' -> ' + p2.padEnd(maxP2) + ' -> ' + p3;
  });
}

function wordWrap(text, maxLen) {
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    if (current.length === 0) {
      current = word;
    } else if (current.length + 1 + word.length <= maxLen) {
      current += ' ' + word;
    } else {
      lines.push(current);
      current = word;
    }
  }
  if (current.length > 0) lines.push(current);
  return lines.join('\n');
}

function buildArray(message1, period1, message2, period2) {
  const n = message1.length;
  const nRows = period1 + period2;
  const array = Array.from({ length: nRows }, () => Array(n).fill(EMPTY));

  for (let i = 0; i < message1.length; i++) {
    const row = i % period1;
    array[row][i] = message1[i];
  }

  for (let i = 0; i < message2.length; i++) {
    const row = period1 + (i % period2);
    array[row][i] = message2[i];
  }

  return array;
}

function printArray(array, period1) {
  const lines = [];
  const nRows = array.length;
  const nCols = nRows ? array[0].length : 0;

  const rowLabelW = nRows ? String(nRows).length : 1;
  const prefixPad = ' '.repeat(rowLabelW + 2);

  let tens = '';
  let units = '';
  for (let c = 0; c < nCols; c++) {
    const col1 = c + 1;
    tens += col1 >= 10 ? String(Math.floor(col1 / 10) % 10) : ' ';
    units += String(col1 % 10);
  }
  lines.push(`${prefixPad}${tens}`);
  lines.push(`${prefixPad}${units}`);

  for (let r = 0; r < nRows; r++) {
    if (r === period1) {
      lines.push(`#${prefixPad.slice(1)}${'-'.repeat(nCols)}`);
    }
    const line = array[r].join('');
    lines.push(`${String(r + 1).padStart(rowLabelW, ' ')}  ${line}`);
  }

  return lines.join('\n');
}

function findMergePair(array) {
  const nRows = array.length;
  const nCols = nRows ? array[0].length : 0;
  for (let i = 0; i < nCols; i++) {
    for (let j = i + 1; j < nCols; j++) {
      for (let r = 0; r < nRows; r++) {
        const a = array[r][i];
        if (a !== EMPTY && a === array[r][j]) {
          return [i, j];
        }
      }
    }
  }
  return null;
}

function mergeColumns(array, i, j, origIndices) {
  const nRows = array.length;

  for (let r = 0; r < nRows; r++) {
    const cj = array[r][j];
    if (cj === EMPTY) continue;
    const ci = array[r][i];
    if (ci !== EMPTY && ci !== cj) {
      throw new Error(
        `Error: merge conflict while merging column ${j + 1} (original column ${origIndices[j]}) into column ${i + 1} (original column ${origIndices[i]}). ` +
        `Row ${r + 1} holds '${ci}' in column ${i + 1} but '${cj}' in column ${j + 1}. Stopping immediately.`);
    }
  }

  for (let r = 0; r < nRows; r++) {
    if (array[r][j] !== EMPTY) {
      array[r][i] = array[r][j];
    }
  }

  for (let r = 0; r < nRows; r++) {
    array[r].splice(j, 1);
  }
}

function compressArray(array, period1, debuggingMode = false) {
  let merges = 0;
  const debugLines = [];
  const origIndices = array[0].map((_, c) => c + 1);
  while (true) {
    const pair = findMergePair(array);
    if (pair === null) break;
    try {
      mergeColumns(array, pair[0], pair[1], origIndices);
    } catch (e) {
      if (debuggingMode) debugLines.push(wordWrap(e.message, 50));
      return { merges, debugLines, error: e.message };
    }
    origIndices.splice(pair[1], 1);
    merges++;
  }
  return { merges, debugLines, error: null };
}

function runSolveIsologs(message1Raw, period1, message2Raw, period2, allowRowDups, allowColDups, debuggingMode = false) {
  const output = [];

  const message1 = stripWhitespace(message1Raw);
  const message2 = stripWhitespace(message2Raw);

  if (message1.length !== message2.length) {
    return { text: `Error: the two messages have unequal length after whitespace removal ` +
      `(message1 = ${message1.length} characters, message2 = ${message2.length} characters). ` +
      `Isolog messages must be the same length.`, monoText: '' };
  }

  output.push(`Message 1 (period ${period1}): ${message1}`);
  output.push(`Message 2 (period ${period2}): ${message2}`);
  output.push('');

  const array = buildArray(message1, period1, message2, period2);
  output.push(`Initial array: ${period1 + period2} rows x ${message1.length} columns ` +
    `(rows 1..${period1} = message1, rows ${period1 + 1}..${period1 + period2} = message2)`);
  output.push('');
  output.push(printArray(array, period1));

  const { merges, debugLines, error: compressError } = compressArray(array, period1, debuggingMode);

  if (debuggingMode && debugLines.length) {
    output.push('');
    output.push('=== Compression debug output ===');
    output.push(...debugLines);
  }

  if (compressError) {
    if (!debuggingMode) {
      output.push('');
      output.push(wordWrap(compressError, 50));
    }
    return { text: output.join('\n'), monoText: '' };
  }

  output.push('');
  output.push(`Compressed array after ${merges} merge(s): ${array.length} rows x ${array[0].length} columns`);
  output.push('');
  output.push(printArray(array, period1));

  const { findRectangles, findIncompleteRectangles, applyIndirectSymmetry, deduplicateColumns, validateColumnConsistency } = ReconstructionMatrix;

  let rows = array.map((row, i) => [String(i + 1), row.join('')]);
  let totalNewLetters = 0;
  let passNum = 0;
  let contradiction = false;
  while (true) {
    passNum++;
    const { rectangles, rectIndex } = findRectangles(rows);
    const incomplete = findIncompleteRectangles(rows);
    let applied;
    try {
      applied = applyIndirectSymmetry(rows, rectangles, rectIndex, incomplete, allowRowDups, allowColDups, false);
    } catch (e) {
      output.push('');
      output.push(`CONTRADICTION on pass ${passNum}: ${e.message}`);
      contradiction = true;
      break;
    }
    rows = applied.rows;
    totalNewLetters += applied.newLetters;

    if (debuggingMode) {
      output.push('');
      output.push(`=== Indirect symmetry pass ${passNum}: ${applied.newLetters} new letter(s) ===`);
      output.push(...alignArrows(applied.outputLines));
      output.push('');
      output.push(printArray(rows.map(([, alpha]) => [...alpha]), period1));
    }

    const consistency = validateColumnConsistency(rows);
    if (!consistency.ok) {
      output.push('');
      output.push(`COLUMN CONFLICT on pass ${passNum}: columns ${consistency.col1} and ${consistency.col2} share a letter in some row but conflict in row '${consistency.rowName}' ('${consistency.letter1}' vs '${consistency.letter2}'). The input periods are likely incorrect.`);
      output.push('');
      output.push(`Reconstruction matrix (inconsistent): ${rows.length} rows x ${rows[0][1].length} columns`);
      output.push('');
      output.push(printArray(rows.map(([, alpha]) => [...alpha]), period1));
      return { text: output.join('\n'), monoText: '' };
    }

    if (applied.newLetters === 0) break;
  }

  if (!contradiction) {

    output.push('');
    output.push(`Reconstruction matrix after ${passNum} pass(es), ${totalNewLetters} new letter(s) added: ${rows.length} rows x ${rows[0][1].length} columns`);
    output.push('');
    output.push(printArray(rows.map(([, alpha]) => [...alpha]), period1));

    let dedupRows, dropped, droppedPositions;
    try {
      ({ rows: dedupRows, dropped, droppedPositions } = deduplicateColumns(rows));
    } catch (e) {
      output.push('');
      output.push(`DEDUPLICATION ERROR: ${e.message}`);
      return { text: output.join('\n'), monoText: '' };
    }
    output.push('');
    if (dropped) {
      output.push(`Deduplicated (${dropped} duplicate column(s) removed: ${droppedPositions.join(', ')}): ${dedupRows.length} rows x ${dedupRows[0][1].length} columns`);
    } else {
      output.push(`Deduplicated (no duplicate columns found): ${dedupRows.length} rows x ${dedupRows[0][1].length} columns`);
    }
    const nCols = dedupRows[0][1].length;
    if (!dedupRows.some(([name]) => name === '0')) {
      const row0Alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.slice(0, nCols).padEnd(nCols, '.');
      dedupRows = [['0', row0Alpha], ...dedupRows];
    }

    output.push('');
    output.push(printDedupMatrix(dedupRows, period1));

    const monoText = convertToMonoalphabetic(message1, period1, dedupRows);
    output.push('');
    output.push('The monoalphabetic ciphertext:');
    for (let i = 0; i < monoText.length; i += 50) output.push(monoText.slice(i, i + 50));
    output.push('');
    output.push('Use a Patristocrat automatic solver to solve the monoalphabetic ciphertext.');
    return { text: output.join('\n'), monoText };
  }

  return { text: output.join('\n'), monoText: '' };
}

function printDedupMatrix(rows, period1) {
  const nCols = rows[0][1].length;
  const maxNameLen = Math.max(...rows.map(([name]) => name.length));
  const prefixPad = ' '.repeat(maxNameLen + 2);
  let tens = '', units = '';
  for (let c = 0; c < nCols; c++) {
    const col1 = c + 1;
    tens += col1 >= 10 ? String(Math.floor(col1 / 10) % 10) : ' ';
    units += String(col1 % 10);
  }
  const lines = [`${prefixPad}${tens}`, `${prefixPad}${units}`];
  for (const [name, alpha] of rows) {
    const rowNum = parseInt(name);
    if (!isNaN(rowNum) && rowNum === period1 + 1) {
      lines.push(`#${prefixPad.slice(1)}${'-'.repeat(nCols)}`);
    }
    lines.push(`${name.padStart(maxNameLen)}  ${alpha}`);
  }
  return lines.join('\n');
}

function convertToMonoalphabetic(message, period, dedupRows) {
  const rowByName = new Map(dedupRows.map(([name, alpha]) => [name, alpha]));
  const row0Alpha = rowByName.get('0') || '';

  const rowLookups = new Map();
  for (const [name, alpha] of dedupRows) {
    const map = {};
    for (let c = 0; c < alpha.length; c++) {
      if (alpha[c] !== '.') map[alpha[c]] = c;
    }
    rowLookups.set(name, map);
  }

  let M = '';
  for (let i = 0; i < message.length; i++) {
    const rowName = String(i % period + 1);
    const lookup = rowLookups.get(rowName) || {};
    const ch = message[i];
    const colIdx = lookup[ch];
    M += (colIdx !== undefined && row0Alpha[colIdx] && row0Alpha[colIdx] !== '.') ? row0Alpha[colIdx] : '.';
  }
  return M;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

let _monoText = '';

function copyMonoToClipboard() {
  navigator.clipboard.writeText(_monoText).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = _monoText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

document.getElementById('run').addEventListener('click', () => {
  const output = document.getElementById('output');
  output.textContent = 'Working ...';
  output.scrollTop = 0;

  setTimeout(() => {
    const message1 = document.getElementById('message1').value;
    const period1 = parseInt(document.getElementById('period1').value, 10);
    const message2 = document.getElementById('message2').value;
    const period2 = parseInt(document.getElementById('period2').value, 10);

    const debuggingMode = document.getElementById('debuggingMode').checked;
    const result = runSolveIsologs(message1, period1, message2, period2, true, true, debuggingMode);
    _monoText = result.monoText;
    let html = escapeHtml(result.text);
    if (result.monoText) {
      const label = escapeHtml('The monoalphabetic ciphertext:');
      html = html.replace(
        label,
        label + ' <button onclick="copyMonoToClipboard()" style="margin-top:0;padding:0.2rem 0.6rem;font-size:0.85rem;cursor:pointer;">Copy to Clipboard</button>'
      );
    }
    output.innerHTML = html;
    output.scrollTop = 0;
  }, 0);
});
</script>
