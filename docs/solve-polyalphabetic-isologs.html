<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solve Polyalphabetic Isologs</title>
<style>
  body { font-family: monospace; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-family: sans-serif; }
  p, label { font-family: sans-serif; }
  .field { margin-top: 1rem; }
  .field label { display: block; margin-bottom: 0.3rem; }
  input[type="text"] { font-family: monospace; font-size: 0.95rem; width: 100%; box-sizing: border-box; padding: 0.3rem; }
  input[type="number"] { font-family: monospace; font-size: 0.95rem; width: 6rem; padding: 0.3rem; }
  button { margin-top: 1rem; padding: 0.5rem 1rem; font-family: sans-serif; cursor: pointer; }
  #output {
    background: #f4f4f4;
    padding: 1rem;
    margin-top: 1.5rem;
    height: 28rem;
    overflow-y: auto;
    overflow-x: auto;
    white-space: pre;
    border: 1px solid #ccc;
  }
  a { font-family: sans-serif; }
</style>
</head>
<body>
  <p><a href="index.html">&larr; back to tools</a></p>
  <h1>Solve Polyalphabetic Isologs</h1>
  <p>Cryptanalysis of two periodic polyalphabetic isolog messages (two ciphertexts whose underlying plaintexts are identical), using the method described in Abraham Sinkov's <em>Elementary Cryptanalysis</em>, section 3.8, pp. 96-110.</p>

  <div class="field">
    <label for="message1">Message 1 (ciphertext)</label>
    <input type="text" id="message1">
  </div>
  <div class="field">
    <label for="period1">Period 1</label>
    <input type="number" id="period1" min="1" value="5">
  </div>
  <div class="field">
    <label for="message2">Message 2 (ciphertext)</label>
    <input type="text" id="message2">
  </div>
  <div class="field">
    <label for="period2">Period 2</label>
    <input type="number" id="period2" min="1" value="7">
  </div>

  <button id="run">Run</button>

  <pre id="output" readonly></pre>

<script>
const EMPTY = '.';

function stripWhitespace(text) {
  return text.replace(/\s+/g, '');
}

function buildArray(message1, period1, message2, period2) {
  const n = message1.length;
  const nRows = period1 + period2;
  const array = Array.from({ length: nRows }, () => Array(n).fill(EMPTY));

  for (let i = 0; i < message1.length; i++) {
    const row = i % period1;
    array[row][i] = message1[i];
  }

  for (let i = 0; i < message2.length; i++) {
    const row = period1 + (i % period2);
    array[row][i] = message2[i];
  }

  return array;
}

function printArray(array, period1) {
  const lines = [];
  const nRows = array.length;
  const nCols = nRows ? array[0].length : 0;

  const rowLabelW = nRows ? String(nRows).length : 1;
  const prefixPad = ' '.repeat(rowLabelW + 2);

  let tens = '';
  let units = '';
  for (let c = 0; c < nCols; c++) {
    tens += c >= 10 ? String(Math.floor(c / 10) % 10) : ' ';
    units += String(c % 10);
  }
  lines.push(`${prefixPad}${tens}`);
  lines.push(`${prefixPad}${units}`);

  for (let r = 0; r < nRows; r++) {
    if (r === period1) {
      lines.push(`#${prefixPad.slice(1)}${'-'.repeat(nCols)}`);
    }
    const line = array[r].join('');
    lines.push(`${String(r + 1).padStart(rowLabelW, ' ')}  ${line}`);
  }

  return lines.join('\n');
}

function findMergePair(array) {
  const nRows = array.length;
  const nCols = nRows ? array[0].length : 0;
  for (let i = 0; i < nCols; i++) {
    for (let j = i + 1; j < nCols; j++) {
      for (let r = 0; r < nRows; r++) {
        const a = array[r][i];
        if (a !== EMPTY && a === array[r][j]) {
          return [i, j];
        }
      }
    }
  }
  return null;
}

function mergeColumns(array, i, j) {
  const nRows = array.length;

  for (let r = 0; r < nRows; r++) {
    const cj = array[r][j];
    if (cj === EMPTY) continue;
    const ci = array[r][i];
    if (ci !== EMPTY && ci !== cj) {
      throw new Error(
        `Error: merge conflict while merging column ${j} into column ${i}. ` +
        `Row ${r} holds '${ci}' in column ${i} but '${cj}' in column ${j}. Stopping immediately.`);
    }
  }

  for (let r = 0; r < nRows; r++) {
    if (array[r][j] !== EMPTY) {
      array[r][i] = array[r][j];
    }
  }

  for (let r = 0; r < nRows; r++) {
    array[r].splice(j, 1);
  }
}

function compressArray(array) {
  let merges = 0;
  while (true) {
    const pair = findMergePair(array);
    if (pair === null) break;
    mergeColumns(array, pair[0], pair[1]);
    merges++;
  }
  return merges;
}

function runSolveIsologs(message1Raw, period1, message2Raw, period2) {
  const output = [];

  const message1 = stripWhitespace(message1Raw);
  const message2 = stripWhitespace(message2Raw);

  if (message1.length !== message2.length) {
    return `Error: the two messages have unequal length after whitespace removal ` +
      `(message1 = ${message1.length} characters, message2 = ${message2.length} characters). ` +
      `Isolog messages must be the same length.`;
  }

  output.push(`Message 1 (period ${period1}): ${message1}`);
  output.push(`Message 2 (period ${period2}): ${message2}`);
  output.push('');

  const array = buildArray(message1, period1, message2, period2);
  output.push(`Initial array: ${period1 + period2} rows x ${message1.length} columns ` +
    `(rows 1..${period1} = message1, rows ${period1 + 1}..${period1 + period2} = message2)`);
  output.push('');
  output.push(printArray(array, period1));

  let merges;
  try {
    merges = compressArray(array);
  } catch (e) {
    output.push('');
    output.push(e.message);
    return output.join('\n');
  }

  output.push('');
  output.push(`Compressed array after ${merges} merge(s): ${array.length} rows x ${array[0].length} columns`);
  output.push('');
  output.push(printArray(array, period1));

  return output.join('\n');
}

document.getElementById('run').addEventListener('click', () => {
  const output = document.getElementById('output');
  output.textContent = 'Working ...';
  output.scrollTop = 0;

  setTimeout(() => {
    const message1 = document.getElementById('message1').value;
    const period1 = parseInt(document.getElementById('period1').value, 10);
    const message2 = document.getElementById('message2').value;
    const period2 = parseInt(document.getElementById('period2').value, 10);

    output.textContent = runSolveIsologs(message1, period1, message2, period2);
    output.scrollTop = 0;
  }, 0);
});
</script>
</body>
</html>
